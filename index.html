<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Retro Lab - Início</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Rajdhani:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        margin: 0;
        padding: 0;
        text-align: center;
        font-family: "Rajdhani", sans-serif;
        color: white;
        background-color: #050505;
        overflow: hidden;
        cursor: url("./img/cursor/cursor.png"), auto;
      }

      p,
      h1,
      h2,
      h3,
      h4,
      h5:hover {
        cursor: url("./img/cursor/text-select.png"), auto;
      }

      a,
      .btn-entrar,
      .social-icons a {
        cursor: url("./img/cursor/pointer.png"), pointer;
      }

      #particles-js {
        position: absolute;
        width: 100%;
        height: 100%;
        top: 0;
        left: 0;
        z-index: -1;
      }

      #conteudo {
        position: relative;
        z-index: 1;
        margin-top: 15vh;
      }

      h1 {
        font-family: "Press Start 2P", cursive;
        font-size: 2.5rem;
        line-height: 1.5;
        color: #ffffff;
        text-shadow:
          0 0 10px #8a2be2,
          0 0 20px #8a2be2,
          0 0 40px #8a2be2;
        margin-bottom: 40px;
      }

      h1 span {
        color: #39ff14;
        text-shadow:
          0 0 10px #39ff14,
          0 0 20px #39ff14;
      }

      p {
        font-size: 1.5rem;
        margin-bottom: 40px;
        letter-spacing: 1px;
      }

      .btn-entrar {
        display: inline-block;
        padding: 20px 40px;
        background-color: transparent;
        color: #ffffff;
        text-decoration: none;
        font-family: "Press Start 2P", cursive;
        font-size: 1rem;
        border-radius: 0;
        border: 4px solid #8a2be2;
        box-shadow:
          0 0 15px #8a2be2,
          inset 0 0 15px #8a2be2;
        transition: 0.3s all ease;
        text-transform: uppercase;
      }

      .btn-entrar:hover {
        background-color: #39ff14;
        color: #050505;
        border-color: #39ff14;
        box-shadow:
          0 0 25px #39ff14,
          inset 0 0 15px #39ff14;
        transform: scale(1.05);
      }

      .about-dev {
        margin: 60px auto 20px auto;
        padding: 30px;
        max-width: 350px;
        background: rgba(138, 43, 226, 0.05);
        backdrop-filter: blur(10px);
        border: 2px solid rgba(57, 255, 20, 0.3);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
        transition:
          transform 0.3s ease,
          border-color 0.3s ease,
          box-shadow 0.3s ease;
      }

      .about-dev:hover {
        transform: translateY(-5px);
        border-color: #39ff14;
        box-shadow: 0 0 20px rgba(57, 255, 20, 0.4);
      }

      .about-dev h2 {
        color: #ffffff;
        margin-top: 0;
        margin-bottom: 20px;
        font-size: 1.8rem;
        text-shadow: 0 0 8px #8a2be2;
      }

      .social-icons {
        display: flex;
        justify-content: center;
        gap: 25px;
      }

      .social-icons a {
        display: inline-block;
        color: white;
        transition:
          transform 0.3s ease,
          filter 0.3s ease;
      }

      .social-icons a:hover {
        transform: scale(1.2) translateY(-5px);
        filter: drop-shadow(0px 0px 10px #39ff14);
      }

      .social-icons img,
      .social-icons svg {
        width: 35px;
        height: auto;
      }
    </style>
  </head>
  <body>
    <audio src="music/CursorConfetti.mp3" type="audio/mpeg"></audio>
    <div id="particles-js"></div>
    <button
      id="music-toggle"
      style="
        position: absolute;
        top: 20px;
        right: 20px;
        z-index: 10;
        background: transparent;
        border: 2px solid #8a2be2;
        color: #fff;
        padding: 10px;
        font-family: &quot;Press Start 2P&quot;, cursive;
        cursor: pointer;
      "
    >
      🎵 PLAY
    </button>

    <div id="conteudo">
      <h1>Bem vindo ao Retro<span>Lab</span></h1>
      <p>Uma plataforma que hospeda os maiores clássicos de NES</p>
      <a href="pages/home.html" class="btn-entrar">PRESS START</a>
    </div>

    <section class="about-dev">
      <h2>Minhas redes Sociais 😊👇</h2>

      <div class="social-icons">
        <a
          href="https://github.com/victor-Sarris/"
          target="_blank"
          rel="external"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="40"
            height="40"
            fill="currentColor"
            class="bi bi-github"
            viewBox="0 0 16 16"
          >
            <path
              d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8"
            />
          </svg>
        </a>
        <a
          href="https://www.linkedin.com/in/victorsarris/"
          target="_blank"
          rel="external"
        >
          <img
            src="https://raw.githubusercontent.com/maurodesouza/profile-readme-generator/master/src/assets/icons/social/linkedin/default.svg"
            alt="LinkedIn"
          />
        </a>
        <a
          href="https://www.instagram.com/victorsax7_/"
          target="_blank"
          rel="external"
        >
          <img
            src="https://raw.githubusercontent.com/maurodesouza/profile-readme-generator/master/src/assets/icons/social/instagram/default.svg"
            alt="Instagram"
          />
        </a>
      </div>
    </section>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

    <script>
      particlesJS("particles-js", {
        particles: {
          number: { value: 80 },
          color: { value: "#ffffff" },
          shape: { type: "edge" },
          opacity: { value: 0.5 },
          size: { value: 3, random: true },
          line_linked: {
            enable: true,
            distance: 150,
            color: "#8a2be2",
            opacity: 0.4,
            width: 1,
          },
          move: {
            enable: true,
            speed: 2,
            direction: "none",
            random: false,
            straight: false,
            out_mode: "out",
            bounce: false,
          },
        },
        interactivity: {
          detect_on: "canvas",
          events: {
            onhover: {
              enable: true,
              mode: "repulse",
            },
            onclick: { enable: true, mode: "push" },
          },
        },
        retina_detect: true,
      });

      const music = document.getElementById("bg-music");
      const musicBtn = document.getElementById("music-toggle");

      musicBtn.addEventListener("click", () => {
        if (music.paused) {
          music.play();
          musicBtn.innerText = "🎵 PAUSE";
          musicBtn.style.borderColor = "#39ff14";
        } else {
          music.pause();
          musicBtn.innerText = "🎵 PLAY";
          musicBtn.style.borderColor = "#8a2be2";
        }
      });

      document.body.addEventListener(
        "click",
        () => {
          if (music.paused) {
            music.play();
            musicBtn.innerText = "🎵 PAUSE";
            musicBtn.style.borderColor = "#39ff14";
          }
        },
        { once: true },
      );
    </script>
  </body>
</html>
