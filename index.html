<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Retro Lab - Início</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        text-align: center;
        font-family: Arial, sans-serif;
        color: white;
        background-color: #111;
        overflow: hidden;
      }

      #particles-js {
        position: absolute;
        width: 100%;
        height: 100%;
        top: 0;
        left: 0;
        z-index: -1;
      }

      #conteudo {
        position: relative;
        z-index: 1;
        margin-top: 15vh;
      }

      h1 {
        font-size: 4rem;
        color: greenyellow;
        text-shadow: 2px 2px 4px #000;
      }
      h1 span {
        color: blueviolet;
      }

      p {
        font-size: 1.2rem;
        margin-bottom: 30px;
      }

      .about {
        background-color: #11111128;
        margin: 30px;
        display: flex;
        flex-direction: column;
        text-align: center;
        align-items: center;
      }

      img {
        width: 200px;
        border: 10px;
        border-color: blue;
        border-radius: 100px;
      }

      .btn-entrar {
        display: inline-block;
        padding: 15px 30px;
        background-color: blueviolet;
        color: white;
        text-decoration: none;
        font-weight: bold;
        font-size: 1.5rem;
        border-radius: 5px;
        border: 3px solid #fff;
        transition: 0.3s;
      }
      .btn-entrar:hover {
        background-color: greenyellow;
        color: black;
        transform: scale(1.1);
      }

      .about-dev {
        margin: 60px auto 20px auto;
        padding: 30px;
        max-width: 350px;
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(10px);
        border-radius: 20px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 15px 25px rgba(0, 0, 0, 0.5);
        transition:
          transform 0.3s ease,
          box-shadow 0.3s ease;
      }

      .about-dev:hover {
        transform: translateY(-5px);
        box-shadow: 0 20px 35px rgba(138, 43, 226, 0.3);
        border-color: rgba(138, 43, 226, 0.5);
      }

      .about-dev h2 {
        color: greenyellow;
        margin-top: 0;
        margin-bottom: 5px;
        font-size: 1.5rem;
        text-shadow: 1px 1px 3px black;

        span {
          color: blueviolet;
        }
      }

      .about-dev p {
        font-size: 0.9rem;
        color: #ccc;
        margin-bottom: 20px;
      }

      .social-icons {
        display: flex;
        justify-content: center;
        gap: 25px;
      }

      .social-icons a {
        display: inline-block;
        transition:
          transform 0.3s ease,
          filter 0.3s ease;
      }

      .social-icons a:hover {
        transform: scale(1.3) translateY(-5px);
        filter: drop-shadow(0px 0px 8px greenyellow);
      }

      .social-icons img {
        width: 40px;
        height: auto;
      }
    </style>
  </head>
  <body>
    <div id="particles-js"></div>

    <div id="conteudo">
      <h1>Bem vindo ao Retro<span>Lab</span></h1>
      <p>Uma plataforma que hospeda os maiores clássicos de NES</p>
      <a href="pages/home.html" class="btn-entrar">PRESS START</a>
    </div>

    <section class="about-dev">
      <h2>Desenvolvido por: <span>Victor Sarrís</span></h2>
      <p>Acompanhe meu trabalho nas redes:</p>

      <div class="social-icons">
        <a href="#" target="_blank" rel="external">
          <img
            src="https://raw.githubusercontent.com/maurodesouza/profile-readme-generator/master/src/assets/icons/social/github/default.svg"
            alt="GitHub"
          />
        </a>
        <a
          href="https://www.linkedin.com/in/victorsarris/"
          target="_blank"
          rel="external"
        >
          <img
            src="https://raw.githubusercontent.com/maurodesouza/profile-readme-generator/master/src/assets/icons/social/linkedin/default.svg"
            alt="LinkedIn"
          />
        </a>
        <a
          href="https://www.instagram.com/victorsax7_/"
          target="_blank"
          rel="external"
        >
          <img
            src="https://raw.githubusercontent.com/maurodesouza/profile-readme-generator/master/src/assets/icons/social/instagram/default.svg"
            alt="Instagram"
          />
        </a>
      </div>
    </section>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

    <script>
      particlesJS("particles-js", {
        particles: {
          number: { value: 80 },
          color: { value: "#ffffff" },
          shape: { type: "circle" },
          opacity: { value: 0.5 },
          size: { value: 3, random: true },
          line_linked: {
            enable: true,
            distance: 150,
            color: "#8a2be2",
            opacity: 0.4,
            width: 1,
          },
          move: {
            enable: true,
            speed: 2,
            direction: "none",
            random: false,
            straight: false,
            out_mode: "out",
            bounce: false,
          },
        },
        interactivity: {
          detect_on: "canvas",
          events: {
            onhover: {
              enable: true,
              mode: "repulse",
            },
            onclick: { enable: true, mode: "push" },
          },
        },
        retina_detect: true,
      });
    </script>
  </body>
</html>
