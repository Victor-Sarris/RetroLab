<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Retro Lab - Início</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        text-align: center;
        font-family: Arial, sans-serif;
        color: white;
        background-color: #111;
        overflow: hidden;
      }

      #particles-js {
        position: absolute;
        width: 100%;
        height: 100%;
        top: 0;
        left: 0;
        z-index: -1;
      }

      #conteudo {
        position: relative;
        z-index: 1;
        margin-top: 15vh;
      }

      h1 {
        font-size: 4rem;
        color: greenyellow;
        text-shadow: 2px 2px 4px #000;
      }
      h1 span {
        color: blueviolet;
      }

      p {
        font-size: 1.2rem;
        margin-bottom: 30px;
      }

      .btn-entrar {
        display: inline-block;
        padding: 15px 30px;
        background-color: blueviolet;
        color: white;
        text-decoration: none;
        font-weight: bold;
        font-size: 1.5rem;
        border-radius: 5px;
        border: 3px solid #fff;
        transition: 0.3s;
      }
      .btn-entrar:hover {
        background-color: greenyellow;
        color: black;
        transform: scale(1.1);
      }
    </style>
  </head>
  <body>
    <div id="particles-js"></div>

    <div id="conteudo">
      <h1>Bem vindo ao Retro<span>Lab</span></h1>
      <p>Uma plataforma que hospeda os maiores clássicos de NES</p>
      <a href="pages/home.html" class="btn-entrar">PRESS START</a>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

    <script>
      particlesJS("particles-js", {
        particles: {
          number: { value: 80 },
          color: { value: "#ffffff" },
          shape: { type: "circle" },
          opacity: { value: 0.5 },
          size: { value: 3, random: true },
          line_linked: {
            enable: true,
            distance: 150,
            color: "#8a2be2",
            opacity: 0.4,
            width: 1,
          },
          move: {
            enable: true,
            speed: 2,
            direction: "none",
            random: false,
            straight: false,
            out_mode: "out",
            bounce: false,
          },
        },
        interactivity: {
          detect_on: "canvas",
          events: {
            onhover: {
              enable: true,
              mode: "repulse",
            },
            onclick: { enable: true, mode: "push" },
          },
        },
        retina_detect: true,
      });
    </script>
  </body>
</html>
