<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Retro Lab - Biblioteca</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Rajdhani:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: "Rajdhani", sans-serif;
        color: white;
        background-color: #050505;
        overflow-x: hidden;
        cursor: url(../img/cursor/cursor.png), auto;
      }

      #particles-js {
        position: fixed;
        width: 100%;
        height: 100%;
        top: 0;
        left: 0;
        z-index: -1;
      }

      a,
      .btn-voltar,
      .card {
        cursor: url(../img/cursor/pointer.png), pointer;
      }

      .btn-voltar {
        display: inline-block;
        padding: 12px 24px;
        margin: 30px;
        background-color: transparent;
        color: #ffffff;
        text-decoration: none;
        font-family: "Press Start 2P", cursive;
        font-size: 0.8rem;
        border: 2px solid #8a2be2;
        box-shadow: 0 0 10px #8a2be2;
        transition: 0.3s;
      }

      .btn-voltar:hover {
        background-color: #8a2be2;
        color: #fff;
        transform: scale(1.05);
        box-shadow: 0 0 20px #8a2be2;
      }

      h1 {
        text-align: center;
        font-family: "Press Start 2P", cursive;
        font-size: 2rem;
        color: #ffffff;
        text-shadow:
          0 0 10px #39ff14,
          0 0 20px #39ff14;
        margin-bottom: 40px;
      }

      .container {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 35px;
        padding: 40px;
        max-width: 1200px;
        margin: 0 auto;
        position: relative;
        z-index: 1;
      }

      .card {
        background: #111;
        border-radius: 0;
        padding: 15px;
        text-align: center;
        transition: 0.3s;
        border: 3px solid #8a2be2;
        box-shadow:
          inset 0 0 10px #8a2be2,
          0 0 10px rgba(138, 43, 226, 0.5);
      }

      .card:hover {
        transform: translateY(-10px);
        background: #1a1a1a;
        border-color: #39ff14;
        box-shadow:
          inset 0 0 15px #39ff14,
          0 0 25px #39ff14;
      }

      .card img {
        width: 100%;
        border-bottom: 3px solid #333;
        margin-bottom: 15px;
        image-rendering: pixelated;
      }

      .card p {
        color: white;
        font-size: 1.3rem;
        margin: 5px 0;
        font-weight: bold;
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      .card a {
        text-decoration: none;
        display: block;
      }
    </style>
  </head>
  <body>
    <div id="particles-js"></div>
    <audio
      id="bg-music"
      src="../music/CursorConfetti.mp3"
      type="audio/mpeg"
      loop
      autoplay
    ></audio>

    <button
      id="music-toggle"
      style="
        position: absolute;
        top: 20px;
        right: 20px;
        z-index: 10;
        background: transparent;
        border: 2px solid #39ff14;
        color: #fff;
        padding: 10px;
        font-family: &quot;Press Start 2P&quot;, cursive;
        cursor: pointer;
      "
    >
      🎵 PAUSE
    </button>

    <div id="particles-js"></div>

    <a href="../index.html" class="btn-voltar">← MENU PRINCIPAL</a>

    <h1>Biblioteca de Clássicos</h1>

    <div class="container">
      <div class="card">
        <a
          href="games/player.html?title=Choujin Sentai Jetman&embed=https://www.retrogames.cc/embed/21566-choujin-sentai-jetman-japan.html"
        >
          <img src="../img/ChoujinSentaiJetman.png" alt="Jetman" />
          <p>Choujin Sentai Jetman</p>
        </a>
      </div>
      <div class="card">
        <a
          href="games/player.html?title=Felix The Cat &embed=https://www.retrogames.cc/embed/21044-felix-the-cat-europe.html"
        >
          <img src="../img/FelixTheCat.png" alt="Jetman" />
          <p>Felix The Cat</p>
        </a>
      </div>
      <div class="card">
        <a
          href="games/player.html?title=Cocoron&embed=https://www.retrogames.cc/embed/21048-cocoron-japan-en-by-magic-destiny-v1-0.html"
        >
          <img src="../img/Cocoron.png" alt="Jetman" />
          <p>Cocoron</p>
        </a>
      </div>
      <div class="card">
        <a
          href="games/player.html?title=Darkwing Duck&embed=https://www.retrogames.cc/embed/20587-darkwing-duck-europe.html"
        >
          <img src="../img/DarkwingDuck.png" alt="Jetman" />
          <p>Darkwing Duck</p>
        </a>
      </div>
      <div class="card">
        <a
          href="games/player.html?title=Ninja Gaiden&embed=https://www.retrogames.cc/embed/17678-ninja-gaiden-episode-ii-the-dark-sword-of-chaos-usa.html"
        >
          <img src="../img/NinjaGaiden.png" alt="Jetman" />
          <p>Ninja Gainde</p>
        </a>
      </div>
      <div class="card">
        <a
          href="games/player.html?title=Mario Edição de Aniversário 35 Anos &embed=https://www.retrogames.cc/embed/43736-smb-special-35th-anniversary-edition.html"
        >
          <img src="../img/Mario1.png" alt="Jetman" />
          <p>Mario</p>
        </a>
      </div>
      <div class="card">
        <a
          href="games/player.html?title=Mario II&embed=https://www.retrogames.cc/embed/44559-return-to-subcon.html"
        >
          <img src="../img/MarioII.png" alt="Jetman" />
          <p>Mario II</p>
        </a>
      </div>
      <div class="card">
        <a
          href="games/player.html?title=Sonic The Hendgehog&embed=https://www.retrogames.cc/embed/44498-sonic-the-hedgehog-vol-2.html"
        >
          <img src="../img/Sonic.png" alt="Jetman" />
          <p>Sonic</p>
        </a>
      </div>
      <div class="card">
        <a
          href="games/player.html?title=MegaMan&embed=https://www.retrogames.cc/embed/44977-megaman-1-the-new-lands-remastered.html"
        >
          <img src="../img/MegaMan.png" alt="Jetman" />
          <p>MegaMan</p>
        </a>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
      particlesJS("particles-js", {
        particles: {
          number: { value: 80 },
          color: { value: "#ffffff" },
          shape: { type: "edge" },
          opacity: { value: 0.5 },
          size: { value: 3, random: true },
          line_linked: {
            enable: true,
            distance: 150,
            color: "#8a2be2",
            opacity: 0.4,
            width: 1,
          },
          move: { enable: true, speed: 2, out_mode: "out" },
        },
        interactivity: {
          detect_on: "canvas",
          events: { onhover: { enable: true, mode: "repulse" } },
        },
      });
      // --- CÓDIGO DA MÚSICA ---
      const music = document.getElementById("bg-music");
      const musicBtn = document.getElementById("music-toggle");
      music.play().catch(() => {
        musicBtn.innerText = "🎵 PLAY";
        musicBtn.style.borderColor = "#8a2be2";
      });

      musicBtn.addEventListener("click", () => {
        if (music.paused) {
          music.play();
          musicBtn.innerText = "🎵 PAUSE";
          musicBtn.style.borderColor = "#39ff14";
        } else {
          music.pause();
          musicBtn.innerText = "🎵 PLAY";
          musicBtn.style.borderColor = "#8a2be2";
        }
      });
    </script>
  </body>
</html>
