<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Retro//Lab — Cyberpunk Edition</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800;900&family=Press+Start+2P&family=Rajdhani:wght@500;600;700&family=Share+Tech+Mono&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body>
    <!-- fundo persistente: partículas, grid, scanlines, vinheta -->
    <div id="particles-js"></div>
    <div class="bg-grid"></div>
    <div class="bg-scanlines"></div>
    <div class="bg-vignette"></div>

    <!-- conteúdo das "telas" (trocado via router em app.js) -->
    <main id="view-root"></main>

    <!-- ============================================================
         PLAYER DE MÚSICA PERSISTENTE
         Fica fora do #view-root, então nunca é recriado ao navegar
         entre telas — o áudio toca sem interrupção nem reinício.
         ============================================================ -->
    <audio id="bg-audio" src="music/CursorConfetti.mp3" loop preload="auto"></audio>

    <div id="music-player" class="music-player">
      <div class="mp-panel">
        <div class="mp-eq"><span></span><span></span><span></span><span></span></div>
        <div class="mp-info">
          <p class="mp-track" id="mp-track-name">CursorConfetti</p>
          <p class="mp-status" id="mp-status">Pausado</p>
        </div>
        <div class="mp-controls">
          <button id="mp-play-pause" aria-label="Play/Pause">▶</button>
          <input
            type="range"
            id="mp-volume"
            min="0"
            max="1"
            step="0.01"
            value="0.5"
            aria-label="Volume"
          />
        </div>
      </div>
      <button id="mp-toggle-expand" class="mp-orb" aria-label="Abrir player de música">
        🎧
      </button>
    </div>

    <div id="mp-toast" class="mp-toast"></div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="assets/js/games-data.js"></script>
    <script src="assets/js/app.js"></script>
  </body>
</html>
